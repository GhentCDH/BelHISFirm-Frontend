name: belhisfirm-prod

services:

  # Ontop Virtual Knowledge Graph
  vkg-scob:
    image: ghcr.io/ghentcdh/belhisfirm-ontop:latest
    container_name: belhisfirm-scob-vkg
    restart: unless-stopped
    environment:
      ONTOP_CORS_ALLOWED_ORIGINS: "*"
      ONTOP_LAZY_INIT: "true"
      ONTOP_DEV_MODE: "false"
      ONTOP_DB_URL: ${DB_URL_SCOB}
      ONTOP_DB_USER: ${DB_USER_SCOB}
      ONTOP_DB_PASSWORD: ${DB_PASSWORD_SCOB}
    network_mode: host
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Sampo UI - Client
  client:
    image: ghcr.io/ghentcdh/sampo-ui-client:latest
    container_name: sampo-ui-client-prod
    network_mode: host
    environment:
      API_URL: ${API_URL}

  # Sampo UI - Server
  server:
    image: ghcr.io/ghentcdh/sampo-ui-server:latest
    container_name: sampo-ui-server-prod
    network_mode: host
    environment:
      SPARQL_ENDPOINT: ${SPARQL_ENDPOINT}
    volumes:
      - ./sampo/configs:/app/configs